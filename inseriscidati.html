
<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Georgia, sans-serif;
      background-color: #4d0da1;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 70px;
      color: black;
    }

    .box {
      background-color: #bb8df7;
      padding: 29px;
      border-radius: 29px;
      width: 500px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    input[type="text"] {
      width: 90%;
      padding: 7px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    input[type="button"] {
      background-color: #5d2b9e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>

  <script>
    function salva() {
      var nome = document.getElementById("nome").value;
      var cognome = document.getElementById("cognome").value;
      var eta = document.getElementById("eta").value;
      var citta = document.getElementById("citta").value;

      var persona = {
        nome: nome,
        cognome: cognome,
        eta: eta,
        citta: citta
      };

      var elenco = localStorage.getItem("elenco");

      if (elenco == null) {
        elenco = [];
      } else {
        elenco = JSON.parse(elenco);
      }

      elenco.push(persona);

      localStorage.setItem("elenco", JSON.stringify(elenco));

      alert("Persona salvata nel localStorage!");
    }
  </script>
</head>

<body>

  <div class="box">
    <h2>Inserimento dati</h2>

   <b>Nome:</b><br>
	<input type="text" id="nome"><br>

   <b>Cognome:</b><br>
	<input type="text" id="cognome"><br>

   <b>Età:</b><br>
	<input type="text" id="eta"><br>

   <b>Città:</b><br>
	<input type="text" id="citta"><br>


    <input type="button" value="Salva" onclick="salva()">
  </div>

</body>
</html>
